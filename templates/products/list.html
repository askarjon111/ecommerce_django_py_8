{% extends "base.html" %}


    
{%block content%}
    <section class="py-5 bg-light">
    <div class="container">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <div>
                <h2 class="fw-bold mb-1">Featured Products</h2>
                <p class="text-muted mb-0">Handpicked items just for you</p>
            </div>
            
        </div>
        
        <div class="row g-4">
            {% for product in products%}
            <div class="col-sm-6 col-md-4 col-lg-3">
                <div class="product-card card h-100 border-0 shadow-sm">
                    <div class="position-relative">
                        <div class="product-img-placeholder bg-white d-flex align-items-center justify-content-center">
                            {% if product.catigory.icon %}
                                <img src="{{ product.catigory.icon.url }}" alt="{{ product.catigory.name }}" class="img-fluid" style="max-height: 100%; object-fit: contain;">
                            {% else %}
                                <i class="bi bi-image text-muted"> false</i>
                            {% endif %}
                        </div>
                        
                        <button type="button" class="wishlist-btn position-absolute d-flex align-items-center justify-content-center">
                            <i class="bi bi-heart text-secondary"></i>
                        </button>
                    </div>

                    <div class="card-body d-flex flex-column">
                        <div class="text-muted small mb-1">{{product.catigory.name}}</div>
                        <h6 class="card-title fw-semibold mb-2">{{product.name}}</h6>
                        <div class="text-warning small mb-2">&#9733;&#9733;&#9733;&#9733;<span class="text-secondary">&#9733;</span> <span class="text-muted">(84)</span></div>
                        <div class="mt-auto d-flex justify-content-between align-items-center">
                            <span class="fw-bold text-primary fs-5">{{product.price}}</span>
                            <button class="btn btn-primary btn-sm"><i class="bi bi-cart-plus"></i></button>
                        </div>
                    </div>
                </div>
            </div>
            {%endfor%}
        </div>
        
    </div>
</section>


{%endblock %}
